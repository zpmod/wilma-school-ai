version: "3.8"

services:
  wilma-parser:
    build: ./services/parser
    container_name: wilma-parser
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./services/parser/data:/app/data
    environment:
      - TZ=Europe/Helsinki
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=hf.co/mradermacher/Llama-Poro-2-8B-Instruct-GGUF:Q4_K_M
      - WILMA_PARSER_TIMEOUT_S=1800
    extra_hosts:
      - "host.docker.internal:host-gateway"
